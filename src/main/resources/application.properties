spring.application.name=asistencia-solo
server.port=8080

# ========= DataSource (XAMPP / MariaDB) =========
spring.datasource.url=jdbc:mysql://localhost:3306/bd_lunes?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========= JPA / Hibernate =========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Si deseas ver SQL con valores
# spring.jpa.properties.hibernate.format_sql=true
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql=TRACE

# (Opcional) Si más adelante habilitas seguridad CORS para el front:
# management.endpoints.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
